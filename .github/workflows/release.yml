name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AsyncLock.NET.sln

      - name: Build
        run: dotnet build AsyncLock.NET.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AsyncLock.NET.sln --configuration Release --no-build --verbosity normal

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="$(dotnet msbuild AsyncLock/AsyncLock.csproj -nologo -getProperty:Version)"
          TAG="${GITHUB_REF#refs/tags/v}"

          if [[ "$TAG" != "$VERSION" ]]; then
            echo "Tag version '$TAG' does not match project version '$VERSION'."
            exit 1
          fi

      - name: Pack
        run: dotnet pack AsyncLock/AsyncLock.csproj --configuration Release --no-build --output artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: artifacts/*
          if-no-files-found: error

      - name: Publish package to NuGet
        if: startsWith(github.ref, 'refs/tags/')
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish symbols to NuGet
        if: startsWith(github.ref, 'refs/tags/')
        run: dotnet nuget push "artifacts/*.snupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
